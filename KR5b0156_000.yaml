front:
  text: 洪恩靈濟真君集福晚朝儀一六
  hash: sha256:3e110780ceceae3ef5808bc97b805c80a30460bebd846280e1ef017f046a8be1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0156_HFL_000-001a, image: hfl/0264/0264-108.png}
body:
  text: 法事如式各禮師存念如法請宣神呪神光朗照瑞氣匝旋箕斗澄輝芝宇晏然玉眸金真寶壇純乾變夜作晝回子午前太華流彩丹鳳飛玄息魔滅姦髙步祥煙天真普集齊到帝前鳴法鼓二十四通太上玄元五靈老君召出臣身中三五功曹左右官使者侍香金童傳言玉女直日香官功曹使者三氣正神速上關啓查邉魏趙刀五大元帥嶽許二元帥天丁力士左右神官以今晚朝升壇闡事臣等欽奉聖旨其諸意旨巳録上聞願得正真生氣下降流入臣等身中令今所啓之言速達九天金闕洪恩真君九天玉闕洪恩真君聖前請稱法位具位臣某與臨壇官衆等謹同誠上啓九天金闕明道達德大仙顯靈溥濟清微洞玄沖虛妙感慈惠護國庇民洪恩真君九天玉闕宣化扶教上仙昭靈博濟髙明弘靜沖湛妙應仁惠輔國佑民洪恩真君聖父齊王忠武翊亮真君聖母仁壽淑善仙妃聖妃涇國夫人順助仁惠貞應仙妃衛國夫人善助慈懿恭靜仙妃聖兄唐王洪王鄂王廣陵王聖舅護國公奉國公聖壻武安侯寧國侯聖子保大侯彰信侯保信侯保寧侯武寧公聖姪昭德侯安定侯太寧侯聖孫武昌侯南昌侯聖子聖孫聖姪列位公侯唐王后明肅仙妃洪王后仁慈仙妃鄂王后順懿仙妃廣陵王后善慶仙妃聖女沖懿仙姬明懿仙姬聖婦善懿夫人仁柔夫人惠順夫人昭懿夫人順恭夫人明哲夫人恭懿夫人靖懿夫人昭穆夫人慈孝夫人聖婦列位夫人上清大洞籙天機院雷霆省天文院地府諸司承行官將驅邪捉祟傳符勑法消災度厄逐凶辟怪監壇護法觀察巡捕將軍太歲尊神十二月將本命元辰星官風雷雨部仙衆左右丞相太宰少宰六部尚侍內府公卿左右注生注壽上宰左右司祿司福上宰左右侍從通事舍人百官庶司所屬曹僚列位公卿左右福祿司所屬二十四司曹官典左右引進仙官內侍順成夫人昭華夫人容華夫人修容夫人修儀夫人昭儀夫人內典婦功夫人絲枲夫人管庫夫人帳籍夫人度支夫人女府女史列位才人女祝女御列位貴人內殿內侍內典列位聖眷夫人燕喜堂內注生司天一注生神后太乙監生神后司祿司命上相夫人守胎衛房夫人保胎護命夫人左右慈訓夫人保傅夫人左右掌籍夫人掌印夫人諸官乳哺夫人抱送夫人撫育夫人托生化婆神永安留守查元帥武安留守邉元帥節度使左監門魏元帥都統軍使右監門趙元帥都監軍使先鋒刁元帥五帥部下精兵猛將左右嶽許二元帥左右行宫侍御從官司祿司勳司士司書列位曹僚司農司稼典絲掌葛列位曹僚司市掌貨考工飭材列位曹僚厨官優官伶官天捷神捷人捷掌卜掌籖掌杯掌鸞傳夢童子神局節級直殿直符香官使者靈濟宫土地合屬威靈咸望洪慈俯垂洞鑒臣聞動生陽靜生隂道妙密生於太極禮言恭德言盛典儀備載於齋科運行不息之機丕顯好生之德龍文鳳篆粲星日之輝煌飈車羽輪儼雲霄而陟降肅朝儀而肆覲奉醮悃以敷言恩光儼格於宸斿香氣濃飄於夕殿鑒臨有赫顧饗無遺拳拳夙志之顒耿耿初心之素百靈衆真之交會十方三界以齊臨齋以事天覩威顔之孔邇暮焉曰夕喜光耀以騰輝絳霞丹霧之飛揚景星慶雲之燁煜蹌蹌濟濟穆穆皇皇鑒醮享之精誠介駢蕃之景福以今晚朝升壇行道請法衆等運兹初捻上香和香至靈濟宫遍九天金闕成華蓋供養顯靈溥濟洪恩真君願此香煙供養九天金闕洪恩真君九天玉闕洪恩真君臣等皈身皈神皈命靈濟宫真仙衆聖願以是捻香功德洪惟九天金闕洪恩真君九天玉闕洪恩真君明道建德博濟昭靈煥文彩於天機光芒星斗震聲威於雷部斡運隂陽華蕚聮輝塤箎迭奏神功難紀聖化無方今故燒香自皈依真君大聖衆至真之德得道之後保天長存和與道合真臣聞香霧浮空暮雲凝碧耿耿朝趨之志拳拳夕愓之心以今晚朝升壇行道運兹二捻上香和香至靈濟宫遍九天玉闕成寶蓋供養昭靈博濟洪恩真君願此香煙供養九天金闕洪恩真君九天玉闕洪恩真君靈濟宫真仙聖衆臣等皈身皈神皈命靈濟宫真仙衆聖願以是捻香功德上祝皇帝陛下恭願道合乾坤明同日月萬載之瑶圖鞏固九重之玉食尊安雨順風調民康物阜百僚忠謹庶位公廉邊鄙塵清戢干戈而偃武閭閻德化力耕稼以歸農至治無為太平有象今故燒香自皈依真君大聖衆至真之德得道之後保天長存和與道合真臣聞天維顯思日入而息散香風於合殿懸慧月於中天以今晚朝升壇行道請法衆等運兹三捻上香和香至靈濟宫遍九天宫闕成雲蓋供養靈濟宫真仙聖衆願此香煙供養九天金闕洪恩真君九天玉闕洪恩真君靈濟宫真仙聖衆臣等皈身皈神皈命靈濟宫真仙衆聖願以是捻香功德歸流儲宫藩屏宰輔臣鄰天下人民寰中庶類伏願一善春融六塵雲散無障緣之結習增行願以薰修二曜五行煥祥光而朗照六宫百辟轉瑞氣以和融玉體清調金枝茂衍今故燒香自皈依真君大聖衆至真之德得道之後永保長生和與道合真唱方懴悔三啓頌三禮重稱法位具位某與臨壇官衆等謹重誠上啓九天金闕洪恩真君九天玉闕洪恩真君靈濟宫真仙聖衆蘸筵設像一切威靈臣聞道之尊德之貴希微妙合於無言大而化聖而神應響潛通於有翼天九重而密勿日三接以虔祈洞洞乎中洋洋在上臣等欽奉綸音而昭事恪遵玄範以朝修醮松花藴藻以齋明馳心太漠瞻絳節瓊輪之縹眇注目層霄臣等敬仰清都翹勤靈濟顧六塵之障染倍切氷兢味三洞之淵微久依雲覆丐汲提之有造庶懇禱以無遺上願聖壽齊天皇明並日玉帛逺來於海島甲兵永洗於邊陲福及儲宫茂介康寧之祉恩流藩屏同臻清淨之榮弼謨益著於忠良民庶咸躋於仁壽宫闈寧謐道化光揚則上明真君大慈之化下副臣等皈命之誠謹啓以聞十二願存神燒香香官使者左右神君侍香諸靈官當令臣向來晚朝之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願誠心昭徹醮欵圓成十方仙童玉女接侍蘭煙傳臣向來所啓之言速達徑詣九天金闕洪恩真君九天玉闕洪恩真君聖前出堂頌出戶洪恩靈濟真君集福晚朝儀
